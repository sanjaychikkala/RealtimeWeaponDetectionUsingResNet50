{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weapon Detection | Real-Time</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Google Fonts: Poppins + Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0015;
            color: #e0e0ff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated neon background orbs */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 25%, rgba(0, 255, 255, 0.07) 0%, transparent 45%),
                        radial-gradient(circle at 80% 80%, rgba(180, 0, 255, 0.06) 0%, transparent 55%);
            z-index: -2;
        }

        .bg-neon {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .neon-orb {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.14), rgba(80, 120, 255, 0.07));
            filter: blur(90px);
            opacity: 0.65;
            animation: floatNeon 55s infinite ease-in-out;
        }

        .neon-orb:nth-child(1) { width: 800px; height: 800px; top: -30%; left: -25%; animation-duration: 70s; }
        .neon-orb:nth-child(2) { width: 650px; height: 650px; bottom: -20%; right: -20%; background: linear-gradient(135deg, rgba(200, 0, 255, 0.11), rgba(255, 80, 180, 0.07)); animation-duration: 90s; animation-delay: 12s; }
        .neon-orb:nth-child(3) { width: 500px; height: 500px; top: 45%; right: 15%; animation-duration: 60s; animation-delay: 25s; }

        @keyframes floatNeon {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(200px, 140px) rotate(12deg); }
            50% { transform: translate(-140px, 220px) rotate(-18deg); }
            75% { transform: translate(160px, -150px) rotate(28deg); }
        }

        /* ── Navbar (identical to prediction page) ── */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 5, 35, 0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            z-index: 1000;
            padding: 1.2rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            color: #00ffff;
            font-size: 1.7rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
        }

        .nav-logo i { margin-right: 0.9rem; }

        .nav-menu {
            display: flex;
            gap: 1.8rem;
        }

        .nav-btn {
            color: #d0e0ff;
            text-decoration: none;
            font-weight: 500;
            padding: 0.7rem 1.4rem;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.22);
            color: #00ffff;
            box-shadow: 0 0 16px rgba(0, 255, 255, 0.5);
        }

        .menu-toggle {
            display: none;
            font-size: 2.2rem;
            color: #00ffff;
            cursor: pointer;
        }

        /* Main content */
        .main-content {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: calc(100vh - 180px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            text-shadow: 0 0 18px #00ffff;
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 2.8rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 720px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #00ffff;
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.4);
            transition: all 0.4s;
        }

        .video-container.danger {
            border-color: #ff0044;
            box-shadow: 0 0 55px rgba(255, 0, 68, 0.85);
            animation: pulseDanger 1.6s infinite alternate;
        }

        @keyframes pulseDanger {
            from { box-shadow: 0 0 35px rgba(255, 0, 68, 0.6); }
            to   { box-shadow: 0 0 70px rgba(255, 0, 68, 1);   }
        }

        video {
            width: 100%;
            display: block;
        }

        .status-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            font-size: 1.5rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .status-overlay.active {
            opacity: 1;
        }

        .controls {
            margin: 2rem 0;
            display: flex;
            gap: 1.4rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 1rem 2.4rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s;
        }

        .start-btn {
            background: linear-gradient(90deg, #00ffff, #0099ff);
            color: #0a0020;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
        }

        .start-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.9);
        }

        .stop-btn {
            background: linear-gradient(90deg, #ff4d4d, #cc0000);
            color: white;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.6);
        }

        .stop-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 40px rgba(255, 77, 77, 0.9);
        }

        .result-box {
            background: rgba(20, 10, 55, 0.72);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
            max-width: 720px;
            width: 100%;
            text-align: center;
            margin: 1.5rem 0 3rem;
        }

        .result-box h2 {
            color: #00ff9d;
            margin-bottom: 0.8rem;
            font-size: 1.9rem;
        }

        .result-box .confidence {
            color: #00ffff;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Notification - same as prediction page */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 2000;
            padding: 1.4rem 2.2rem;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1.15rem;
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            opacity: 0;
            transform: translateY(-30px);
            transition: all 0.6s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .notification.danger {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
            border-left: 8px solid #ff0000;
        }

        .notification i {
            font-size: 1.8rem;
        }

        /* Footer */
        footer {
            background: linear-gradient(135deg, #0a0015, #180030);
            padding: 3rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(0, 255, 255, 0.15);
            color: #a0a0ff;
            font-size: 0.95rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(10, 5, 35, 0.98);
                padding: 1.8rem;
            }

            .nav-menu.active { display: flex; }
            .menu-toggle { display: block; }

            h1 { font-size: 2.3rem; }
            .controls { flex-direction: column; gap: 1.2rem; }
            button { width: 85%; max-width: 340px; }
            .notification { right: 15px; top: 15px; font-size: 1rem; padding: 1rem 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- Neon Background Orbs -->
    <div class="bg-neon">
        <div class="neon-orb"></div>
        <div class="neon-orb"></div>
        <div class="neon-orb"></div>
    </div>

    <!-- Navbar (same as prediction page) -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="userHome" class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                Weapon Detection System
            </a>
            <div class="menu-toggle" id="mobileMenu">☰</div>
            <div class="nav-menu" id="navMenu">
                <a href="userHome" class="nav-btn"><i class="fas fa-home mr-1"></i>Home</a>
                <a href="training" class="nav-btn"><i class="fas fa-brain mr-1"></i>Training</a>
                <a href="prediction" class="nav-btn"><i class="fas fa-crosshairs mr-1"></i>Prediction</a>
                <a href="live" class="nav-btn"><i class="fas fa-video mr-1"></i>Live Stream</a>
                <a href="log" class="nav-btn"><i class="fas fa-sign-out-alt mr-1"></i>Logout</a>
                <a href="#about" class="nav-btn"><i class="fas fa-info-circle mr-1"></i>About</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <h1><i class="fas fa-video"></i> Live Weapon Detection</h1>

        <div class="video-container" id="videoContainer">
            <video id="video" autoplay playsinline></video>
            <div class="status-overlay" id="statusOverlay">Initializing camera...</div>
        </div>

        <div class="controls">
            <button class="start-btn" id="startBtn"><i class="fas fa-play"></i> Start Detection</button>
            <button class="stop-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> Stop Detection</button>
        </div>

        <div class="result-box">
            <h2 id="predictionText">Waiting for detection...</h2>
            <p class="confidence" id="confidenceText"></p>
        </div>
    </div>

    <!-- Floating Notification Container -->
    <div id="notificationContainer"></div>

    <!-- Alarm Sound -->
    <audio id="alarmSound" preload="auto">
        <source src="{% static 'alarm.mp3' %}" type="audio/mpeg">
    </audio>

    <!-- Footer -->
    <footer>
        <p>© 2026 Real-Time Weapon Detection System | Powered by AI</p>
    </footer>

    <!-- JavaScript -->
    <script>
        // Mobile menu toggle (same as prediction page)
        const mobileMenu = document.getElementById('mobileMenu');
        const navMenu = document.getElementById('navMenu');
        if (mobileMenu && navMenu) {
            mobileMenu.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });
        }

        // ── Live Detection Logic ──
        const video = document.getElementById('video');
        const videoContainer = document.getElementById('videoContainer');
        const statusOverlay = document.getElementById('statusOverlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn  = document.getElementById('stopBtn');
        const predictionText = document.getElementById('predictionText');
        const confidenceText = document.getElementById('confidenceText');
        const alarm = document.getElementById('alarmSound');

        let stream = null;
        let intervalId = null;
        let isDetecting = false;

        const weaponKeywords = [
            'gun', 'pistol', 'handgun', 'rifle', 'ak47', 'shotgun', 'smg',
            'knife', 'sword', 'blade', 'firearm', 'revolver', 'weapon', 'assault'
        ];

        async function startDetection() {
            try {
                statusOverlay.textContent = "Requesting camera access...";
                statusOverlay.classList.add('active');

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }   // change to "environment" for rear camera on mobile
                });

                video.srcObject = stream;
                statusOverlay.textContent = "Camera ready. Starting detection...";

                startBtn.disabled = true;
                stopBtn.disabled = false;
                isDetecting = true;

                intervalId = setInterval(captureAndSend, 1400);

                setTimeout(() => statusOverlay.classList.remove('active'), 1800);
            } catch (err) {
                statusOverlay.textContent = "Camera access denied or unavailable.";
                console.error("Camera error:", err);
                setTimeout(() => statusOverlay.classList.remove('active'), 4000);
            }
        }

        function stopDetection() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (intervalId) clearInterval(intervalId);

            video.srcObject = null;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            isDetecting = false;

            predictionText.textContent = "Detection stopped.";
            confidenceText.textContent = "";
            videoContainer.classList.remove('danger');
            alarm.pause();
            alarm.currentTime = 0;
            hideAllNotifications();
        }

        async function captureAndSend() {
            if (!isDetecting || !video.videoWidth) return;

            const canvas = document.createElement('canvas');
            canvas.width  = 224;
            canvas.height = 224;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 224, 224);

            const base64Image = canvas.toDataURL('image/jpeg', 0.82);

            try {
                const response = await fetch("/live_predict/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify({ image: base64Image })
                });

                if (!response.ok) throw new Error("Server responded with error");

                const data = await response.json();

                predictionText.textContent = `Detected: ${data.result || "—"}`;
                confidenceText.textContent = data.confidence ? `Confidence: ${Number(data.confidence).toFixed(1)}%` : "";

                checkForWeapon(data.result || "", Number(data.confidence) || 0);
            } catch (err) {
                console.error("Detection fetch error:", err);
                predictionText.textContent = "Connection error... retrying";
            }
        }

        function checkForWeapon(result, confidence) {
            const lower = result.toLowerCase().trim();
            const isWeapon = weaponKeywords.some(kw => lower.includes(kw)) && confidence >= 50;

            if (isWeapon) {
                videoContainer.classList.add('danger');
                showDangerNotification(lower, confidence);
                if (alarm.paused) {
                    alarm.currentTime = 0;
                    alarm.play().catch(e => console.log("Audio blocked:", e));
                }
            } else {
                videoContainer.classList.remove('danger');
                alarm.pause();
                alarm.currentTime = 0;
                hideAllNotifications();
            }
        }

        function showDangerNotification(weapon, conf) {
            hideAllNotifications();
            const container = document.getElementById('notificationContainer');
            const toast = document.createElement('div');
            toast.className = 'notification danger show';
            toast.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i>
                <span>WEAPON DETECTED: ${weapon.toUpperCase()} (${conf.toFixed(1)}%)</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 600);
            }, 9000);
        }

        function hideAllNotifications() {
            document.querySelectorAll('.notification').forEach(el => {
                el.classList.remove('show');
                setTimeout(() => el.remove(), 600);
            });
        }

        function getCookie(name) {
            let value = null;
            if (document.cookie) {
                const parts = document.cookie.split(';');
                for (let part of parts) {
                    part = part.trim();
                    if (part.startsWith(name + '=')) {
                        value = decodeURIComponent(part.substring(name.length + 1));
                        break;
                    }
                }
            }
            return value;
        }

        // Event listeners
        startBtn.addEventListener('click', startDetection);
        stopBtn.addEventListener('click', stopDetection);
        window.addEventListener('beforeunload', stopDetection);
    </script>

</body>
</html>
